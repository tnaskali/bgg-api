name: bgg-api-native

services:
  bgg-api-native-backend:
    image: ghcr.io/tnaskali/bgg-api-native:master
    build:
      context: .
      dockerfile: Dockerfile.native
    container_name: bgg-api-native-backend
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      BGG_APPLICATION_TOKEN: ${BGG_APPLICATION_TOKEN}
    restart: unless-stopped
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
